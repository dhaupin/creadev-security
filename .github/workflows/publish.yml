name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create .npmrc
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - name: Verify token
        run: |
          USER=$(npm whoami 2>&1)
          if [ $? -ne 0 ]; then
            echo "::error::NPM_TOKEN is invalid: $USER"
            exit 1
          fi
          echo "Publishing as: $USER"

      - run: npm ci

      - run: npm publish --access public --retry 3
