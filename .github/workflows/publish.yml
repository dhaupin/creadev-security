name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate NPM_TOKEN
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi
          USER=$(npm whoami --registry=https://registry.npmjs.org/ --authToken=${{ secrets.NPM_TOKEN }} 2>&1)
          if [ $? -ne 0 ] || [ -z "$USER" ]; then
            echo "::error::NPM_TOKEN is invalid. Generate new at https://www.npmjs.com/settings/-/access-tokens"
            exit 1
          fi
          echo "Verified as: $USER"

      - run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - run: npm ci

      - run: npm publish --access public --retry 3
